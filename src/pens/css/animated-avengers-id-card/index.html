<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <title>Sci-Fi Avengers ID Card | Pure CSS Glow & HUD Animation</title>

        <meta
            name="description"
            content="Pure CSS Avengers ID card with animated rings, inspired by Tony Stark. Adapted from Kunal Sarkar's 2018 tutorial."
        />
        <meta
            name="keywords"
            content="HTML, CSS, animation, Avengers, Iron Man, Tony Stark, ID card, UI design, frontend, CodePen project, Karl Horning"
        />
        <meta name="author" content="Karl Horning" />
        <meta name="creator" content="Karl Horning" />

        <!-- Open Graph / Social -->
        <meta property="og:title" content="Animated Avengers ID Card" />
        <meta
            property="og:description"
            content="A CSS-only Avengers ID card. This project utilises box-shadow glow effects, absolute positioning for layered elements, and keyframe animations. Inspired by Marvel's Iron Man UI and adapted from Kunal Sarkar's original concept."
        />
        <meta
            property="og:image"
            content="https://www.karlhorning.dev/src/assets/previews/animated-avengers-id-card.webp"
        />
        <meta
            property="og:url"
            content="https://www.karlhorning.dev/codepen-pens/"
        />
        <meta property="og:type" content="website" />
        <meta name="twitter:card" content="summary_large_image" />

        <link
            rel="canonical"
            href="https://www.karlhorning.dev/codepen-pens/"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
        />
        <link rel="stylesheet" href="./css/styles.css" />
    </head>

    <body>
        <main>
            <div class="id-card-wrapper">
                <div class="id-card">
                    <div class="profile-row">
                        <div class="dp">
                            <div class="dp-arc-outer"></div>
                            <div class="dp-arc-inner"></div>
                            <img
                                src="./img/tony_stark_promo.jpg"
                                alt="Tony Stark (Iron Man)"
                                loading="eager"
                            />
                        </div>
                        <div class="desc">
                            <h1>Tony Stark</h1>
                            <p>
                                <strong>Strengths:</strong> Genius-level
                                intellect, engineering mastery
                            </p>
                            <p>
                                <strong>Weaknesses:</strong> Arrogance and
                                overreliance on technology
                            </p>
                            <p><strong>Known as:</strong> Iron Man</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </body>
