<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="A pure CSS animation for a pulsing heartbeat effect. It uses keyframes to sync scaling and opacity changes on a loop. This is a lightweight solution for icons or buttons, requiring no JavaScript."
        />
        <meta name="keywords" content="HTML, CSS, Emoji" />
        <meta name="author" content="Karl Horning" />
        <title>CSS Heartbeat Pulse Effect | Emoji & Keyframes</title>
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <main>
            <div
                class="heart animate-heartbeat"
                aria-label="heartbeat"
                role="img"
            >
                ❤️
            </div>
        </main>
    </body>
</html>
