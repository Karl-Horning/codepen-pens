<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="A minimalist recreation of Cyclops from the X-Men, built entirely with CSS shapes. This project uses layered divs and border-radius properties to mimic the geometric vector style of Jag Nagra. A study in CSS positioning and the box model without any external assets or SVGs."
        />
        <meta name="keywords" content="HTML, CSS" />
        <meta name="author" content="Karl Horning" />
        <title>Pure CSS Cyclops | Minimalist X-Men Illustration</title>
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <main>
            <div
                class="box"
                role="img"
                aria-label="Cyclops from X-Men, pure CSS illustration"
            >
                <div class="head"></div>
                <div class="temples"></div>
                <div class="left-ear-top"></div>
                <div class="left-ear-bottom"></div>
                <div class="right-ear-top"></div>
                <div class="right-ear-bottom"></div>
                <div class="visor-outer">
                    <div class="visor-inner"></div>
                </div>
                <div class="neck">
                    <div class="chin-middle">
                        <div class="nose-left"></div>
                        <div class="nose-right"></div>
                        <div class="mouth"></div>
                        <div class="mouth-left"></div>
                        <div class="mouth-right"></div>
                        <div class="bottom-lip"></div>
                        <div class="top-lip-left"></div>
                        <div class="top-lip-right"></div>
                    </div>
                    <div class="chin-left"></div>
                    <div class="chin-right"></div>
                </div>
                <div class="chest"></div>
                <div class="shoulder-right"></div>
                <div class="shoulder-left"></div>
            </div>
        </main>
    </body>
</html>
