<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="A standard 404 error page. Uses a centered layout with a heading and a link to return to the home page. Focused on clear communication without extra scripts or complex styling."
        />
        <meta name="author" content="Karl Horning" />
        <title>Minimalist 404 Page | Responsive Error Template</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main>
            <div class="panel">
                <h1 class="panel__heading">404</h1>
                <p class="panel__subtitle">Page not found</p>
                <p class="panel__body">
                    The page you're looking for doesn't exist or may have been
                    moved.
                </p>
                <a href="/" class="panel__link">Return home</a>
            </div>
        </main>
    </body>
</html>
