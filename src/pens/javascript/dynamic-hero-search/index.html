<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="A client-side search application that filters a dataset of superheroes in real-time. It uses an input event listener to trigger a filter on a JavaScript object array, dynamically updating a table display without page refreshes. An example of basic state management and DOM manipulation."
        />
        <meta name="keywords" content="HTML, CSS, JavaScript" />
        <meta name="author" content="Karl Horning" />
        <title>Real-Time JavaScript Search Filter | Dynamic Data Table</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <main class="container text-light">
            <div class="row">
                <h1 class="display-4 text-center border-bottom mb-5 py-5">
                    Dynamic Hero Search
                </h1>
            </div>

            <div class="row border-bottom">
                <form id="search-group">
                    <label for="search-box" class="form-label visually-hidden"
                        >Search for a hero or publisher</label
                    >
                    <div class="input-group mb-5">
                        <input
                            id="search-box"
                            class="form-control"
                            name="search"
                            placeholder="Search for a hero or publisher"
                            type="text"
                        />
                        <button
                            id="search-button"
                            class="btn btn-primary"
                            type="submit"
                        >
                            Search
                        </button>
                        <button
                            id="clear-button"
                            class="btn btn-outline-primary"
                            type="button"
                        >
                            Clear Search
                        </button>
                    </div>
                </form>
            </div>

            <div class="row mt-3">
                <p class="text-secondary text-right">
                    <strong id="results-num">100</strong> heroes found
                </p>
            </div>

            <div id="table-container" class="row mb-5">
                <table id="hero-table" class="table table-dark table-striped">
                    <thead>
                        <tr>
                            <th scope="col">Name</th>
                            <th scope="col">Publisher</th>
                        </tr>
                    </thead>
                    <tbody id="hero-table-body"></tbody>
                </table>
            </div>
        </main>

        <footer class="container border-top py-3">
            <p
                id="copyright-info"
                class="text-center text-sm no-margin text-white"
            >
                &copy; 2023 Karl Horning
            </p>
        </footer>

        <script src="./script.js"></script>
    </body>
</html>
