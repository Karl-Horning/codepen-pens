<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Pure JS Parallax Gallery | Full-Viewport Scroll Transitions</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta
            name="description"
            content="A full-viewport photo gallery using a custom parallax scroll implementation. It uses JavaScript to calculate scroll offsets and apply varying transform speeds to image layers. Built without external libraries."
        />
        <meta
            name="keywords"
            content="HTML, CSS, JavaScript, parallax, photo gallery, web animation, accessibility, responsive design"
        />
        <meta name="author" content="Karl Horning" />
        <link
            rel="canonical"
            href="https://www.karlhorning.dev/codepen-pens/"
        />

        <!-- Social / Open Graph -->
        <meta property="og:title" content="Parallax Photo Gallery" />
        <meta
            property="og:description"
            content="A full-viewport photo gallery using a custom parallax scroll implementation. It uses JavaScript to calculate scroll offsets and apply varying transform speeds to image layers. Built without external libraries."
        />
        <meta
            property="og:image"
            content="https://www.karlhorning.dev/src/assets/previews/parallax-photo-gallery.webp"
        />
        <meta property="og:type" content="website" />
        <meta
            property="og:url"
            content="https://www.karlhorning.dev/codepen-pens/"
        />

        <link rel="stylesheet" href="./css/styles.css" />
    </head>
    <body>
        <main>
            <section
                class="parallax"
                aria-label="Evergreen Reflections"
                data-image="./img/huge-backgrounds-02.webp"
                data-speed="0.3"
            >
                <div class="caption">
                    <span class="title">Evergreen Reflections</span>
                    <div class="meta">
                        <span>Photo: Jane Doe</span>
                        <span>&copy; 2018</span>
                    </div>
                </div>
            </section>

            <section
                class="parallax"
                aria-label="Desert Road"
                data-image="./img/huge-backgrounds-26.webp"
                data-speed="0.4"
            >
                <div class="caption">
                    <span class="title">Desert Road</span>
                    <div class="meta">
                        <span>Photo: Jane Doe</span>
                        <span>&copy; 2018</span>
                    </div>
                </div>
            </section>

            <section
                class="parallax"
                aria-label="Above the Clouds"
                data-image="./img/huge-backgrounds-41.webp"
                data-speed="0.25"
            >
                <div class="caption">
                    <span class="title">Above the Clouds</span>
                    <div class="meta">
                        <span>Photo: Jane Doe</span>
                        <span>&copy; 2018</span>
                    </div>
                </div>
            </section>

            <section
                class="parallax"
                aria-label="A Lone Figure on the Beach"
                data-image="./img/huge-backgrounds-04.webp"
                data-speed="0.28"
            >
                <div class="caption">
                    <span class="title">A Lone Figure on the Beach</span>
                    <div class="meta">
                        <span>Photo: Jane Doe</span>
                        <span>&copy; 2018</span>
                    </div>
                </div>
            </section>

            <section
                class="parallax"
                aria-label="The Abandoned Pier"
                data-image="./img/huge-backgrounds-24.webp"
                data-speed="0.5"
            >
                <div class="caption">
                    <span class="title">The Abandoned Pier</span>
                    <div class="meta">
                        <span>Photo: Jane Doe</span>
                        <span>&copy; 2018</span>
                    </div>
                </div>
            </section>

            <section
                class="parallax"
                aria-label="The Beach Tracks"
                data-image="./img/huge-backgrounds-49.webp"
                data-speed="0.3"
            >
                <div class="caption">
                    <span class="title">The Beach Tracks</span>
                    <div class="meta">
                        <span>Photo: Jane Doe</span>
                        <span>&copy; 2018</span>
                    </div>
                </div>
            </section>
        </main>

        <script src="./js/script.js"></script>
    </body>
</html>
