<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="A minimalist, distraction-free writing environment. It features a constrained text width for better readability, high-contrast indicators for word counts, and a clean sans-serif interface. Built with JavaScript to provide real-time feedback without visual clutter."
        />
        <meta name="keywords" content="HTML, CSS, JavaScript" />
        <meta name="author" content="Karl Horning" />
        <title>
            Distraction-Free Writing Tool | Accessible JS Word Counter
        </title>
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <main>
            <textarea
                id="wordCountTextarea"
                placeholder="Start writing…"
                aria-label="Writing area"
                autofocus
            ></textarea>
            <div class="word-count">
                <span id="wordCountNumber" aria-live="polite">0</span>
                <span class="word-count__label" aria-hidden="true">words</span>
            </div>
        </main>
        <script src="./script.js"></script>
    </body>
</html>
