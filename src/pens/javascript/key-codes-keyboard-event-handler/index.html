<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Press any key to inspect its KeyboardEvent properties — key, code, and modifier states — displayed as a live terminal-style object."
        />
        <meta name="keywords" content="HTML, CSS, JavaScript" />
        <meta name="author" content="Karl Horning" />
        <title>JavaScript Key Codes Keyboard Event Handler</title>
        <link rel="stylesheet" href="./css/styles.css" />
    </head>
    <body>
        <main class="container">
            <div class="terminal" role="status" aria-live="polite" aria-label="Keyboard event output">
                <p class="terminal-prompt">// Press any key</p>
                <pre class="terminal-output" id="event-output"></pre>
            </div>
        </main>
        <script src="./js/script.js"></script>
    </body>
</html>
