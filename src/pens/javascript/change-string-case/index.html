<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="A utility for converting strings into common programming formats, including camelCase, snake_case, PascalCase, and kebab-case. Features an automatic 'copy to clipboard' function upon conversion. This Pen served as the logic prototype for the 'Transform Text' Chrome, Edge, Firefox  extension."
        />
        <meta name="keywords" content="HTML, CSS, JavaScript" />
        <meta name="author" content="Karl Horning" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="./styles.css" />
        <title>
            JS String Case Converter | Camel, Snake & Kebab Case Formatter
        </title>
    </head>

    <body>
        <main
            class="d-flex align-items-center justify-content-center min-h-screen"
        >
            <section class="container">
                <div class="row">
                    <div class="input-group input-group-lg">
                        <input
                            id="string-to-format"
                            class="form-control"
                            aria-label="String to format"
                            placeholder="Enter a string..."
                            type="text"
                        />

                        <select
                            id="case-select"
                            class="form-select"
                            aria-label="Select the case to format the string"
                        >
                            <option value="snakeCase" selected>
                                snake_case
                            </option>
                            <option value="kebabCase">kebab-case</option>
                            <option value="camelCase">camelCase</option>
                            <option value="pascalCase">PascalCase</option>
                        </select>

                        <button
                            id="search-button"
                            class="btn btn-primary"
                            type="button"
                            tabindex="0"
                        >
                            Format
                        </button>
                    </div>
                </div>
            </section>
        </main>
        <script src="./script.js"></script>
        <script src="https://www.cornify.com/js/cornify.js"></script>
    </body>
</html>
