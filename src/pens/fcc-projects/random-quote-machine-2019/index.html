<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="A 2019 update to my freeCodeCamp random quote machine — displays random quotes with gradient backgrounds, and lets you tweet your favourites. Press Space for a new quote or T to tweet."
        />
        <meta name="keywords" content="HTML, CSS, freeCodeCamp" />
        <meta name="author" content="Karl Horning" />
        <title>freeCodeCamp: Random Quote Machine 2019</title>
        <link
            rel="stylesheet"
            href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&display=swap"
        />
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <div class="flex-container">
            <main class="main-content">
                <section class="quote">
                    <p class="quote-text"></p>
                    <p class="source"></p>
                </section>

                <section class="buttons">
                    <button id="tweet" class="btn">
                        <i class="fa fa-twitter"></i> Tweet
                    </button>
                    <button id="new-quote" class="btn">
                        <i class="fa fa-random"></i> New Quote
                    </button>
                </section>
            </main>
        </div>
        <script src="./script.js"></script>
    </body>
</html>
